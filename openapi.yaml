openapi: 3.1.0
info:
  title: distributionMapApp API
  description: 'API pública de distributionMapApp para visualización y exportación
    de datos geoespaciales (NDVI, temperatura, humedad del suelo, precipitación, cuerpos
    de agua, riesgo de inundación, estaciones hidrológicas) usando Google Earth Engine.

    '
  version: 1.0.0
  contact:
    name: distributionMapApp Support
servers:
- url: /
  description: Current server (relative paths)
paths:
  /api/ndvi-gif-bbox:
    get:
      operationId: getNdviGifBbox
      summary: NDVI animated GIF
      description: 'Generate an animated NDVI (MODIS MOD13Q1) GIF for the given bounding
        box.

        **Dual date mode:** Accepts direct dates (`start` + `end`) or seasonal shorthand
        (`year` + `season`). If `start`/`end` are missing, `year`+`season` is converted
        server-side using the supported seasons.

        '
      tags:
      - GIF
      parameters:
      - name: start
        in: query
        required: true
        schema:
          type: string
          format: date
        description: Start date (YYYY-MM-DD). Required unless using year+season.
      - name: end
        in: query
        required: true
        schema:
          type: string
          format: date
        description: End date (YYYY-MM-DD). Required unless using year+season.
      - name: bbox
        in: query
        required: true
        schema:
          type: string
        description: 'JSON array [minLon, minLat, maxLon, maxLat]. Constraints: min/max
          lon ∈ [-180,180], min/max lat ∈ [-90,90], min < max for each pair.

          '
      - name: ratio
        in: query
        required: false
        schema:
          type: number
        description: Optional resolution ratio for the GIF.
      - name: task_id
        in: query
        required: false
        schema:
          type: string
        description: Optional SSE task ID to track generation progress.
      - name: year
        in: query
        required: false
        schema:
          type: integer
        description: Year for seasonal shorthand. Used only if start/end are absent.
      - name: season
        in: query
        required: false
        schema:
          type: string
        description: Season name for seasonal shorthand. Used only if start/end are
          absent.
      responses:
        '200':
          description: Animated NDVI GIF with dates and values.
          content:
            application/json:
              schema:
                type: object
                properties:
                  gifUrl:
                    type: string
                    description: Relative URL to the generated GIF.
                  bbox:
                    type: array
                    items:
                      type: number
                    description: Bounding box used.
                  dates:
                    type: array
                    items:
                      type: string
                    description: Date labels in the GIF.
                  ndvi:
                    type: array
                    items:
                      type: number
                    description: NDVI mean values per date.
        '400':
          description: Invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until the client should retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-rate-limit: 30/minute
      x-cache-policy:
        max_age: 3600
        etag: true
